<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelumbo Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #app {
            height: 100%;
            width: 100%;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e1e2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #f8f8f2;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #6272a4;
            border-top-color: #bd93f9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-color-scheme: light) {
            #loading {
                background: #ffffff;
                color: #1e1e2e;
            }
            .spinner {
                border-color: #e0e0e0;
                border-top-color: #5a5acf;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading Nelumbo Editor...</div>
    </div>

    <div id="app"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
