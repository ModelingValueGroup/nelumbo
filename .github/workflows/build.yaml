name: build

on  : [ push, workflow_dispatch ]

jobs:
    build:
        runs-on: ubuntu-latest
        if     : "!contains(github.event.head_commit.message, '[no-ci]')"
        env    :
            ALLREP_TOKEN: "${{secrets.ALLREP_TOKEN}}"
            TOKEN       : "${{secrets.ALLREP_TOKEN}}"
            CI          : "true"
        steps  :
            -   uses: actions/checkout@v6
                with:
                    fetch-depth: 0
            
            -   uses: actions/setup-java@v4
                with:
                    java-version: 21
                    distribution: zulu
            
            # Ensure Docker CLI and Buildx are available for docker commands
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3
            
            ################################################################################
            -   name: "build"
                run : ./gradlew --info --scan
            
            -   name: "generate-slides"
                run : ./gradlew --info generate-slides
        
            -   name: "upload-slides"
                uses: actions/upload-artifact@v5
                with:
                    name: slides
                    path: docs/site
                    if-no-files-found: error
                    retention-days: 30
                    
            -   name: "upload-fat-jar"
                uses: actions/upload-artifact@v5
                with:
                    name: fatjar
                    path: build/libs/nelumbo*all.jar
                    if-no-files-found: error
                    retention-days: 30
