name: build

on:
    push:
        branches: [ '**' ]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        if     : "!contains(github.event.head_commit.message, '[no-ci]') && !startsWith(github.ref, 'refs/heads/dependabot/')"
        env    :
            ALLREP_TOKEN: "${{secrets.ALLREP_TOKEN}}"
            TOKEN       : "${{secrets.ALLREP_TOKEN}}"
            CI          : "true"
        steps  :
            -   uses: actions/checkout@v7
                with:
                    fetch-depth: 0
            
            -   uses: actions/setup-java@v4
                with:
                    java-version: 21
                    distribution: zulu
                    cache       : gradle

            # Node is needed to build the website module's Monaco/LSP frontend bundle (:website:npmBundle)
            -   uses: actions/setup-node@v4
                with:
                    node-version         : 22
                    cache                : npm
                    cache-dependency-path: website/src/main/frontend/package-lock.json

            # Ensure Docker CLI and Buildx are available for docker commands
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4
            
            ################################################################################
            -   name: "build"
                run : |
                    ./gradlew --info \
                        mvgCorrector \
                        build \
                        :website:serverJar \
                        :mcp:mcpJar \
                        editorJar \
                        :lsp:plugins:eclipse:jar \
                        :lsp:plugins:intellij:buildPlugin \
                        mvgTagger \
                        build-slides

            ################################################################################
            # the serverJar is built in the "build" step above (a second gradle run here would
            # re-trigger :mvgcorrector against the generated docs/site assets and fail); this step
            # only runs Playwright against that pre-built jar.
            -   name: "e2e (playwright)"
                working-directory: website/src/main/frontend
                run : |
                    npm ci
                    npx playwright install --with-deps chromium
                    npx playwright test

            ################################################################################
            -   name: "upload-editor-jar"
                uses: actions/upload-artifact@v7
                with:
                    name: editor
                    path: build/libs/nelumbo*editor.jar
                    if-no-files-found: error
                    retention-days: 30

            -   name: "upload-slides"
                uses: actions/upload-artifact@v7
                with:
                    name: slides
                    path: docs/site
                    if-no-files-found: error
                    retention-days: 30
                    
            -   name: "upload-eclipse-plugin"
                uses: actions/upload-artifact@v7
                with:
                    name: eclipse-plugin
                    path: lsp/plugins/eclipse/build/libs/eclipse-nelumbo-plugin-*.jar
                    if-no-files-found: error
                    retention-days: 30

            -   name: "upload-intellij-plugin"
                uses: actions/upload-artifact@v7
                with:
                    name: intellij-plugin
                    path: lsp/plugins/intellij/build/distributions/intellij-nelumbo-plugin-*.zip
                    if-no-files-found: error
                    retention-days: 30
